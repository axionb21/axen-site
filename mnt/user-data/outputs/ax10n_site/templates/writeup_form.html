{% extends "base.html" %}
{% block title %}{{ 'Edit' if w else 'New' }} writeup{% endblock %}
{% block content %}
<section class="section">
  <h2 class="section-title">{{ 'edit' if w else 'new' }} writeup</h2>
  <form method="post" class="form">
    <label>title<input name="title" value="{{ w.title if w else '' }}" required></label>
    <label>event<input name="event" value="{{ w.event if w else '' }}" placeholder="SekaiCTF 2026"></label>
    <label>category<input name="category" value="{{ w.category if w else '' }}" placeholder="pwn / web / crypto"></label>
    <label>summary<input name="summary" value="{{ w.summary if w else '' }}" maxlength="400"></label>
    <label>body<textarea name="body_md" rows="14" required>{{ w.body_md if w else '' }}</textarea></label>
    <button type="submit">save</button>
  </form>
</section>
{% endblock %}
