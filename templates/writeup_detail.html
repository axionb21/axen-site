{% extends "base.html" %}
{% block title %}{{ w.title }} | AXEN{% endblock %}
{% block content %}
<section class="section detail">
  <a href="{{ url_for('index') }}" class="back">← back</a>
  <span class="card-tag">{{ w.category or 'misc' }}</span>
  <h1>{{ w.title }}</h1>
  <p class="card-event">{{ w.event }} · {{ w.created_at.strftime('%d %b %Y') }}</p>
  <div class="prose">{{ w.body_md | e | replace('\n', '<br>') | safe }}</div>
</section>
{% endblock %}
