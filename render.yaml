databases:
  - name: axen-db
    plan: free

services:
  - type: web
    name: axen-site
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_URL_PATH
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: axen-db
          property: connectionString
